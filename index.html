<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan IPPNUDA</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'Poppins', sans-serif;
        }

        /* Card Utama */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #eee;
            animation: fadeIn 1s ease-out;
            position: relative;
        }

        /* Logo */
        .logo {
            width: 65px;
            margin-bottom: 15px;
        }

        /* Bingkai Sudut */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #27ae60; /* Tetap hijau sebagai identitas */
            opacity: 0.4;
        }
        .top-l { top: 15px; left: 15px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
        .top-r { top: 15px; right: 15px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
        .bot-l { bottom: 15px; left: 15px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
        .bot-r { bottom: 15px; right: 15px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 2.6rem;
            color: #27ae60;
            margin: 10px 0;
        }

        .event-subtext {
            font-size: 0.65rem;
            color: #95a5a6;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 12px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(39,174,96,0.3);
            margin-top: 15px;
        }

        .btn:hover { transform: scale(1.05); background: #219150; }

        /* Link Generator Trigger - WARNA BIRU */
        .admin-link {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #3498db; /* Warna Biru */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
            font-weight: 500;
        }
        
        .admin-link:hover { 
            color: #2980b9; /* Biru lebih gelap saat hover */
            text-decoration: underline;
        }
        
        .admin-link svg {
            width: 14px;
            height: 14px;
            fill: currentColor; /* Mengikuti warna teks (biru) */
        }

        /* Modal Pop-up */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
        }

        .btn-wa {
            background: #25d366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }

        .close-modal {
            margin-top: 15px;
            display: block;
            font-size: 0.8rem;
            color: #e74c3c;
            cursor: pointer;
        }
        
        input {
            padding: 10px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 10px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="corner top-l"></div>
        <div class="corner top-r"></div>
        <div class="corner bot-l"></div>
        <div class="corner bot-r"></div>

        <img src="https://iili.io/fwsbiVR.png" alt="Logo" class="logo">
        
        <div style="letter-spacing: 2px; color: #888; font-size: 0.65rem;">MENANTI KEHADIRAN:</div>
        <div id="nama-tamu" class="name">Tamu Undangan</div>
        
        <button onclick="bukaUndangan()" class="btn">Buka Undangan</button>
        <div class="event-subtext">Peringatan Nuzulul Qur'an</div>

        <div class="admin-link" onclick="toggleModal(true)">
            <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
            Buat Link Undangan
        </div>
    </div>

    <div id="waModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; font-size:1rem;">Buat Link Tamu</h3>
            <p style="font-size:0.7rem; color: #7f8c8d;">Nama akan otomatis muncul di undangan, Edit bila perlu sebelum dikirim</p>
            <input type="text" id="inputNama" placeholder="Nama Tamu(Gunakan + untuk Spasi">
            <button onclick="kirimWA()" class="btn-wa">Kirim ke WhatsApp</button>
            <span class="close-modal" onclick="toggleModal(false)">Tutup</span>
        </div>
    </div>

    <audio id="musik" src="https://raw.githubusercontent.com/ippnuda-reborn-91/takbiran/main/Allahummarhamna%20Bil%20Quran.mp3" loop></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama).replace(/\+/g, ' ');
        }

        function toggleModal(show) {
            document.getElementById('waModal').style.display = show ? 'flex' : 'none';
        }

        function bukaUndangan() {
            const audio = document.getElementById('musik');
            audio.play().catch(e => console.log("Audio play blocked")); 
            setTimeout(() => {
                window.open("https://www.ippnudamunjul.xyz/tools/undangan/nuzulul-quran", "_blank");
            }, 500); 
        }

        function kirimWA() {
            const namaInput = document.getElementById('inputNama').value;
            if(!namaInput) return alert("Masukkan nama tamu!");

            const namaFormat = encodeURIComponent(namaInput).replace(/%20/g, '+');
            const linkBase = "https://ippnuda-reborn-91.github.io/undangan/";
            const linkFinal = linkBase + "?to=" + namaFormat;

            const pesan = `Assalamu'alaikum, kami mengundang Anda: *${namaInput}* untuk hadir di acara Nuzulul Qur'an. Silakan buka undangan di sini: ${linkFinal}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(pesan)}`, '_blank');
            toggleModal(false);
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('waModal')) toggleModal(false);
        }
    </script>

</body>
</html>
